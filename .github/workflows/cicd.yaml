name: Helping Hands CI/CD

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    #------------------------------
    #       CI pipeline
    #------------------------------
    # checkout code
    - name: Checkout repository
      uses: actions/checkout@v3
    
    # login to docker hub
    - name: Login to Docker Hub
      run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login --username ${{ secrets.DOCKER_USERNAME }} --password-stdin

    # build and push auth service
    - name: Build and push auth service
      run: |
        docker build -t ${{secrets.DOCKER_USERNAME}}/auth-service ./services/auth-service
        docker push ${{secrets.DOCKER_USERNAME}}/auth-service
      
    # build and push api gateway
    - name: Build and push api gateway
      run: |
        docker build -t ${{secrets.DOCKER_USERNAME}}/api-gateway ./api-gateway
        docker push ${{secrets.DOCKER_USERNAME}}/api-gateway
      
    # build and push campaign service
    - name: Build and push campaign service
      run: |
        docker build -t ${{secrets.DOCKER_USERNAME}}/campaign-service ./services/campaign-service
        docker push ${{secrets.DOCKER_USERNAME}}/campaign-service
      
    # build and push donation service
    - name: Build and push donation service
      run: |
        docker build -t ${{secrets.DOCKER_USERNAME}}/donation-service ./services/donation-service
        docker push ${{secrets.DOCKER_USERNAME}}/donation-service
      
    # build and push frontend
    - name: Build and push frontend
      run: |
        docker build -t ${{secrets.DOCKER_USERNAME}}/frontend ./frontend
        docker push ${{secrets.DOCKER_USERNAME}}/frontend
    
    #------------------------------
    #       CD pipeline
    #------------------------------

    # ssh into the server and deploy the new images and config maps
    - name: Deploy to server(SSH)
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{secrets.SSH_HOST}}
        username: ${{secrets.SSH_USER}}
        key: ${{secrets.SSH_KEY}}
        script: |
          echo "Starting deployment"

          kubectl create configmap auth-config \
          --from-env-file=/Documents/helpinghands-env/auth.env \
          -n helping-hands --dry-run=client -o yaml | kubectl apply -f -

          kubectl create configmap gateway-config \
          --from-env-file=/Documents/helpinghands-env/gateway.env \
          -n helping-hands --dry-run=client -o yaml | kubectl apply -f -

          kubectl create configmap campaign-config \
          --from-env-file=/Documents/helpinghands-env/campaign.env \
          -n helping-hands --dry-run=client -o yaml | kubectl apply -f -

          kubectl create configmap donation-config \
          --from-env-file=/Documents/helpinghands-env/donation.env \
          -n helping-hands --dry-run=client -o yaml | kubectl apply -f -

          kubectl create configmap db-config \
          --from-env-file=/Documents/helpinghands-env/db.env \
          -n helping-hands --dry-run=client -o yaml | kubectl apply -f -

          kubectl apply -f /Helping-Hands/k8s/

          kubectl rollout restart deployment -n helping-hands

          echo "Deployment successful"